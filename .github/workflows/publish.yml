name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Sincronizar dependências
        run: uv sync --all-groups

      - name: Type check (mypy strict)
        run: uv run mypy

      - name: Testes
        run: uv run pytest

      - name: Build do pacote
        run: uv build

      - name: Upload dos artefatos
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # PyPI Trusted Publishing (OIDC)
    steps:
      - name: Baixar artefatos
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publicar no PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Detectar pre-release
        id: prerelease
        run: |
          if [[ "${GITHUB_REF_NAME}" == *rc* || "${GITHUB_REF_NAME}" == *a* || "${GITHUB_REF_NAME}" == *b* ]]; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Criar GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          --title "${GITHUB_REF_NAME}"
          --generate-notes
          ${{ steps.prerelease.outputs.flag }}
